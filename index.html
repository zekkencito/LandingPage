<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Landing Page - Renzo Caycho | Ingeniero en Sistemas | Full-Stack & IA">
    <title>Renzo Caycho - Full-Stack & IA Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>

        :root {
            --primary-color: #fbbf24;
            --primary-hover: #f59e0b;
            --secondary-color: #fbbf24;
            --bg-dark: #000000;
            --bg-card: #1a1a1a;
            --bg-hover: #262626;
            --text-primary: #ffffff;
            --text-secondary: #d1d5db;
            --border-color: #333333;
            --accent-color: #fbbf24;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 10px 30px rgba(251, 191, 36, 0.2);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ==================== Main Container ==================== */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border-radius: calc(var(--border-radius) * 2);
            padding: 40px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== Header & Profile ==================== */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            background: #1a1a1a;
            padding: 3px;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
            animation: none;
            border: 3px solid var(--primary-color);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .subtitle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .subtitle::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        .subtitle::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        /* ==================== Buttons Container ==================== */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: transparent;
            color: var(--text-primary);
            text-decoration: none;
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary-color);
            transition: var(--transition);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
            color: #000000;
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn i {
            font-size: 1.25rem;
        }

        .btn-text {
            flex: 1;
            text-align: center;
        }

        /* Estilos específicos para botones */
        .btn-cv {
            --color: #3b82f6;
        }

        .btn-portfolio {
            --color: #10b981;
        }

        .btn-github {
            --color: #8b5cf6;
        }

        .footer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        .footer-title {
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 20px;
            background: transparent;
            color: var(--primary-color);
            text-decoration: none;
            border: 1px solid var(--border-color);
            border-radius: calc(var(--border-radius) - 4px);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-contact:hover {
            background: var(--primary-color);
            color: #000000;
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .btn-contact i {
            font-size: 1.1rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 20px;
                border-radius: calc(var(--border-radius) * 1.5);
            }

            .header h1 {
                font-size: 1.875rem;
            }

            .header p {
                font-size: 1rem;
            }

            .profile-image {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 0.95rem;
            }

            .btn i {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 28px 16px;
            }

            .header h1 {
                font-size: 1.625rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .profile-image {
                width: 90px;
                height: 90px;
                margin-bottom: 16px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 0.9rem;
                gap: 10px;
            }

            .btn i {
                font-size: 1rem;
            }

            .subtitle {
                gap: 4px;
            }

            .subtitle::before,
            .subtitle::after {
                width: 3px;
                height: 3px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --primary-color: #f59e0b;
                --primary-hover: #d97706;
                --secondary-color: #f59e0b;
                --bg-dark: #ffffff;
                --bg-card: #f9fafb;
                --bg-hover: #f3f4f6;
                --text-primary: #1f2937;
                --text-secondary: #6b7280;
                --border-color: #e5e7eb;
            }

            body {
                background: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Renzo Caycho</h1>
            <div class="subtitle">
                <p>Ingeniero en Sistemas | Programador</p>
            </div>
        </header>

        <section class="buttons-container">

                <i class="fas fa-file-pdf"></i>

            <a href="cv-english.pdf" class="btn btn-cv" download>

                <span class="btn-text">Download CV (English)</span>
            </a>
            <a href="https://zekkencito.github.io/Portafolio/" class="btn btn-portfolio" target="_blank">
                <i class="fas fa-laptop"></i>

            <a href="https://github.com/zekkencito" class="btn btn-github" target="_blank">

                </a>
                <a href="https://wa.me/526361106001" class="btn-contact" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    <span>+52 6361106001</span>
                </a>
            </div>
        </footer>
    </div>
</body>
</html>
